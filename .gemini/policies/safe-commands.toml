# Allow git commit commands automatically
[[rule]]
toolName = "run_shell_command"
commandRegex = "git (status|add|reset|commit|diff|log|stash|checkout) "
decision = "allow"
# If true, lets shell commands use redirection operators (>, >>, <,
# <<, <<<). By default, the policy engine asks for confirmation when
# redirection is detected, even if a rule matches the command. This
# permission is granular; it only applies to the specific rule it's
# defined in. In chained commands (e.g., cmd1 > file && cmd2), each
# individual command rule must permit redirection if it's used.
allowRedirection = true
priority = 100

# Allow jj commands that don't require a pager
[[rule]]
toolName = "run_shell_command"
commandRegex = "jj (describe|status|st|split|bookmark|workspace)"
decision = "allow"
allowRedirection = true
priority = 100

# Allow jj show, log, and diff ONLY if they include the --no-pager flag
[[rule]]
toolName = "run_shell_command"
commandRegex = 'jj (show|log|diff).*--no-pager'
decision = "allow"
allowRedirection = true
priority = 100

# Deny jj show, log, and diff if they lack the --no-pager flag
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["jj show", "jj log", "jj diff"]
decision = "deny"
priority = 90
denyMessage = "For stability, you must include the '--no-pager' flag when running jj show, log, or diff."
